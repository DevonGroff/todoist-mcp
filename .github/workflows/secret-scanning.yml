name: Secret Scanning

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: v8.28.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          version="${GITLEAKS_VERSION#v}"
          install_dir="${RUNNER_TEMP}/gitleaks"
          mkdir -p "$install_dir"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_${version}_linux_x64.tar.gz" -o "${RUNNER_TEMP}/gitleaks.tar.gz"
          tar -xzf "${RUNNER_TEMP}/gitleaks.tar.gz" -C "$install_dir" gitleaks
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Run secret scan
        run: npm run secrets:scan
